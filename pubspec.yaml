name: the_morse_sounder
description: "A digital archive for collectors of telegraph sounders — cataloging electromagnetic voice receivers used in Morse code transmission."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#AAA6A6"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter_native_splash:
  color: "#AAA6A6"
  image: "assets/images/logo.png"
  android: true
  ios: true
  android_12: 
    color: "#AAA6A6"
    image: "assets/images/logo.png"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon.png
    - assets/images/logo.png
    - assets/images/
